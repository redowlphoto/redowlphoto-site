{{ if .Params.slug }}

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Product",
  "name": {{ .Title | jsonify }},
  "image": {{ .Params.image | absURL | jsonify }},
  "description": {{ .Params.description | jsonify }},
  "brand": {
    "@type": "Brand",
    "name": "RedOwlPhoto"
  },
  "offers": [
    {
      "@type": "Offer",
      "url": {{ (printf "%sprints/%s-70x50" .Site.BaseURL .Params.slug) | jsonify }},
      "priceCurrency": "DKK",
      "price": "600",
      "availability": "https://schema.org/InStock",
      "itemCondition": "https://schema.org/NewCondition"
    },
    {
      "@type": "Offer",
      "url": {{ (printf "%sprints/%s-30x20" .Site.BaseURL .Params.slug) | jsonify }},
      "priceCurrency": "DKK",
      "price": "150",
      "availability": "https://schema.org/InStock",
      "itemCondition": "https://schema.org/NewCondition"
    }
  ]
}
</script>

{{ end }}
