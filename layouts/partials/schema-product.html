{{ if .IsPage }}

<script type="application/ld+json">
{
  "@context": "https://schema.org/",
  "@type": "Product",
  "name": "{{ .Title }}",
  "image": "{{ .Params.image | absURL }}",
  "description": "{{ .Params.description }}",
  "brand": {
    "@type": "Brand",
    "name": "RedOwlPhoto"
  },
  "offers": [
    {
      "@type": "Offer",
      "url": "{{ .Permalink }}",
      "priceCurrency": "DKK",
      "price": "150",
      "availability": "https://schema.org/InStock",
      "itemCondition": "https://schema.org/NewCondition",
      "name": "{{ .Title }} – 30x20 cm"
    },
    {
      "@type": "Offer",
      "url": "{{ .Permalink }}",
      "priceCurrency": "DKK",
      "price": "600",
      "availability": "https://schema.org/InStock",
      "itemCondition": "https://schema.org/NewCondition",
      "name": "{{ .Title }} – 70x50 cm"
    }
  ]
}
</script>

{{ end }}
